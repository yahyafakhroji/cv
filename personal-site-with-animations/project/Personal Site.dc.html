<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#0c0c0d}
  @keyframes ps-rise{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</helmet>
<div ref="{{ setRoot }}" style="position:fixed;inset:0;background:#0c0c0d;overflow:hidden">

  <iframe data-frame="a" src="SiteEditorial.dc.html" title="Editorial direction" style="position:absolute;inset:0;width:100%;height:100%;border:none;background:#F4F1EA"></iframe>
  <iframe data-frame="b" data-src="SiteTerminal.dc.html" title="Terminal direction" style="position:absolute;inset:0;width:100%;height:100%;border:none;background:#0B0B0C"></iframe>
  <iframe data-frame="c" data-src="SiteTimeline.dc.html" title="Timeline direction" style="position:absolute;inset:0;width:100%;height:100%;border:none;background:#F1F1ED"></iframe>

  <!-- direction switcher -->
  <div role="group" aria-label="Choose a design direction" style="position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:99999;display:flex;align-items:center;gap:4px;padding:5px;border-radius:100px;background:rgba(16,16,18,0.86);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 14px 44px -12px rgba(0,0,0,0.62);border:1px solid rgba(255,255,255,0.12);animation:ps-rise 0.6s cubic-bezier(0.22,1,0.36,1) both">
    <span style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.42);padding:0 8px 0 8px">Direction</span>
    <button data-seg data-dir="a" onClick="{{ pickA }}" style="padding:9px 15px;border:none;border-radius:100px;font-family:'Space Mono',monospace;font-size:12.5px;font-weight:700;cursor:pointer;transition:background 0.25s ease,color 0.25s ease;white-space:nowrap;-webkit-appearance:none">1a · Editorial</button>
    <button data-seg data-dir="b" onClick="{{ pickB }}" style="padding:9px 15px;border:none;border-radius:100px;font-family:'Space Mono',monospace;font-size:12.5px;font-weight:700;cursor:pointer;transition:background 0.25s ease,color 0.25s ease;white-space:nowrap;-webkit-appearance:none">1b · Terminal</button>
    <button data-seg data-dir="c" onClick="{{ pickC }}" style="padding:9px 15px;border:none;border-radius:100px;font-family:'Space Mono',monospace;font-size:12.5px;font-weight:700;cursor:pointer;transition:background 0.25s ease,color 0.25s ease;white-space:nowrap;-webkit-appearance:none">1c · Timeline</button>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}">
class Component extends DCLogic {
  state = { dir: 'a' };

  componentDidMount() { this.updateDisplay(); this.paintSegs(); }

  ensureLoaded(d) {
    const root = this._root;
    if (!root) return;
    const f = root.querySelector('[data-frame="' + d + '"]');
    if (f && !f.getAttribute('src') && f.dataset.src) f.setAttribute('src', f.dataset.src);
  }

  updateDisplay() {
    const root = this._root;
    if (!root) return;
    root.querySelectorAll('[data-frame]').forEach((f) => {
      f.style.display = (f.getAttribute('data-frame') === this.state.dir) ? 'block' : 'none';
    });
  }

  paintSegs() {
    const root = this._root;
    if (!root) return;
    root.querySelectorAll('[data-seg]').forEach((b) => {
      const on = b.getAttribute('data-dir') === this.state.dir;
      b.style.background = on ? '#F4F2EC' : 'transparent';
      b.style.color = on ? '#111214' : 'rgba(255,255,255,0.6)';
    });
  }

  setDir(d) {
    if (this.state.dir === d) return;
    this.ensureLoaded(d);
    this.setState({ dir: d }, () => { this.updateDisplay(); this.paintSegs(); });
  }

  renderVals() {
    const setRoot = (el) => { this._root = el; };
    return {
      setRoot,
      pickA: () => this.setDir('a'),
      pickB: () => this.setDir('b'),
      pickC: () => this.setDir('c'),
    };
  }
}
</script>
</body>
</html>
