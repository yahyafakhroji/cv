name = "hiyahya-cv"
compatibility_date = "2026-06-01"

# Static-only Worker: Cloudflare serves the built site from its edge.
# No `main` script — this is an assets-only Worker.
[assets]
directory = "./dist"
not_found_handling = "404-page"   # serves dist/404.html for unknown paths

# --- Custom domain (commented out to avoid moving hiyahya.dev off the old site) ---
# Uncomment when you're ready to cut the live domain over to this new app.
# The old site stays safe on the `legacy` branch as a rollback.
# routes = [
#   { pattern = "hiyahya.dev", custom_domain = true },
#   { pattern = "www.hiyahya.dev", custom_domain = true }
# ]
